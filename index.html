<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人狼GMアシスタント</title>
  <meta name="description" content="人狼ゲームのゲームマスターをサポートするWebアプリ。フェーズ進行、GMスクリプト表示、プレイヤー管理を簡単に。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <!-- ===== セットアップ画面 ===== -->
  <div id="setup-screen" class="screen active">
    <div class="setup-container">
      <div class="logo-area">
        <span class="logo-icon">🐺</span>
        <h1>人狼GMアシスタント</h1>
        <p class="subtitle">ゲームマスターの進行をスムーズに</p>
      </div>

      <div class="role-summary">
        <span class="role-badge villager">村人 ×3</span>
        <span class="role-badge werewolf">人狼 ×2</span>
        <span class="role-badge seer">占い師 ×1</span>
        <span class="role-badge medium">霊能者 ×1</span>
        <span class="role-badge hunter">狩人 ×1</span>
      </div>

      <div class="player-inputs" id="player-inputs">
        <!-- JS で 8人分生成 -->
      </div>

      <div id="setup-error" class="setup-error" style="display:none;"></div>

      <button id="btn-start" class="btn-primary">
        <span class="btn-icon">🌙</span>
        ゲーム開始
      </button>
    </div>
  </div>

  <!-- ===== ゲーム進行画面 ===== -->
  <div id="game-screen" class="screen">
    <!-- 勝利条件（常時表示・画面端に小さく） -->
    <div class="win-conditions">
      <div class="win-line">🐺 狼が村と同数 → 人狼勝ち</div>
      <div class="win-line">🏘️ 狼全滅 → 市民勝ち</div>
    </div>

    <div class="game-layout">
      <!-- メインエリア -->
      <main class="main-panel">
        <div class="phase-header" id="phase-header">
          <span class="phase-icon" id="phase-icon">🌙</span>
          <h2 id="phase-title">1日目 夜</h2>
          <span class="phase-sub" id="phase-sub">配役確認</span>
        </div>

        <div class="script-card" id="script-card">
          <div class="script-text" id="script-text"></div>
        </div>

        <!-- タイマー -->
        <div class="timer-area" id="timer-area" style="display:none;">
          <div class="timer-display" id="timer-display">06:00</div>
          <div class="timer-buttons">
            <button class="btn-timer" id="btn-timer-start" onclick="toggleTimer()">▶ スタート</button>
            <button class="btn-timer" id="btn-timer-reset" onclick="resetTimer()">↺ リセット</button>
          </div>
        </div>

        <!-- 選択UI -->
        <div class="action-area" id="action-area" style="display:none;">
          <h3 id="action-title">対象を選んでください</h3>
          <div class="player-select-grid" id="player-select-grid"></div>
        </div>

        <div class="nav-buttons">
          <button id="btn-prev" class="btn-secondary" onclick="prevStep()">← 戻る</button>
          <button id="btn-next" class="btn-primary" onclick="nextStep()">次へ →</button>
        </div>
      </main>

      <!-- サイドパネル -->
      <aside class="side-panel">
        <div class="panel-section">
          <h3>📋 プレイヤー一覧</h3>
          <div id="player-list" class="player-list"></div>
        </div>

        <div class="panel-section">
          <h3>💀 死亡者</h3>
          <div id="dead-list" class="dead-list">
            <p class="empty-msg">まだ誰も死亡していません</p>
          </div>
        </div>

        <div class="panel-section">
          <h3>📊 状況</h3>
          <div class="status-counts" id="status-counts">
            <div class="count-item"><span class="count-label">生存</span><span class="count-val" id="alive-count">8</span></div>
            <div class="count-item"><span class="count-label">村側</span><span class="count-val" id="village-count">6</span></div>
            <div class="count-item"><span class="count-label">狼側</span><span class="count-val" id="wolf-count">2</span></div>
          </div>
        </div>

        <div class="panel-section">
          <h3>🔮 占い結果ログ</h3>
          <div id="seer-log" class="seer-log">
            <p class="empty-msg">まだ占い結果はありません</p>
          </div>
        </div>

        <button class="btn-danger" onclick="confirmReset()">🔄 ゲームリセット</button>
      </aside>
    </div>
  </div>

  <!-- ===== 勝利画面 ===== -->
  <div id="result-screen" class="screen">
    <div class="result-container">
      <div class="result-icon" id="result-icon">🐺</div>
      <h1 id="result-title">人狼陣営の勝利！</h1>
      <p id="result-desc"></p>
      <div class="result-roles" id="result-roles"></div>
      <button class="btn-primary" onclick="resetGame()">
        <span class="btn-icon">🔄</span>
        もう一度遊ぶ
      </button>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
